<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animex APK</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
/* ══════════ RESET & BASE ══════════ */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background-color: #050505;
  color: #ffffff;
  font-family: 'Poppins', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* Background Animation (Glowing Orbs) */
body::before, body::after {
  content: '';
  position: absolute;
  width: 300px;
  height: 300px;
  border-radius: 50%;
  filter: blur(100px);
  z-index: -1;
  opacity: 0.4;
  animation: floatOrb 10s infinite alternate;
}
body::before { background: #ff3c3c; top: -50px; left: -50px; }
body::after { background: #6a00ff; bottom: -50px; right: -50px; animation-delay: -5s; }

@keyframes floatOrb {
  0% { transform: translate(0, 0); }
  100% { transform: translate(30px, 50px); }
}

/* ══════════ LOADING SCREEN ══════════ */
#loader {
  position: fixed;
  inset: 0;
  background: #050505;
  z-index: 9999;  display: flex;
  justify-content: center;
  align-items: center;
  transition: opacity 0.5s ease;
}
.spinner {
  width: 50px;
  height: 50px;
  border: 4px solid rgba(255, 60, 60, 0.2);
  border-left-color: #ff3c3c;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { 100% { transform: rotate(360deg); } }

/* ══════════ MAIN CARD ══════════ */
.container {
  width: 100%;
  max-width: 400px;
  background: rgba(20, 20, 25, 0.85); /* Glass effect */
  backdrop-filter: blur(10px);
  padding: 30px 25px;
  border-radius: 24px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow: 
    0 20px 50px rgba(0,0,0,0.5),
    0 0 0 1px rgba(255, 60, 60, 0.1); /* Subtle red border glow */
  transform: translateY(20px);
  opacity: 0;
  animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  animation-delay: 0.5s; /* Wait for loader */
}

@keyframes slideUp {
  to { transform: translateY(0); opacity: 1; }
}

/* Header */
h1 {
  text-align: center;
  font-weight: 700;
  font-size: 28px;
  letter-spacing: 2px;
  margin-bottom: 25px;
  background: linear-gradient(to right, #fff, #ff3c3c);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-transform: uppercase;
}
/* Info Rows (Version/Size) */
.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255, 255, 255, 0.03);
  padding: 12px 16px;
  border-radius: 12px;
  margin-bottom: 10px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  transition: 0.3s;
}
.row:hover {
  background: rgba(255, 60, 60, 0.05);
  border-color: rgba(255, 60, 60, 0.2);
}
.row span:first-child {
  color: #aaa;
  font-size: 14px;
  font-weight: 500;
}
.row span:last-child {
  color: #fff;
  font-weight: 700;
  font-family: monospace;
  font-size: 15px;
  letter-spacing: 0.5px;
}

/* Description Area */
.desc {
  margin-top: 20px;
  text-align: center;
}
.desc img {
  width: 100%;
  height: auto;
  max-height: 350px;
  object-fit: cover;
  border-radius: 16px;
  margin: 10px 0;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.1);
  transition: transform 0.3s ease;
}
.desc img:hover {
  transform: scale(1.02);
}

/* ══════════ BUTTON ══════════ */.btn {
  display: block;
  margin-top: 25px;
  padding: 16px;
  text-align: center;
  background: linear-gradient(135deg, #ff3c3c, #d60000);
  border-radius: 16px;
  text-decoration: none;
  color: #fff;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: 1px;
  box-shadow: 0 10px 25px rgba(255, 60, 60, 0.4);
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
}

.btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 35px rgba(255, 60, 60, 0.6);
}

/* Shine Effect on Button */
.btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  transition: 0.5s;
}
.btn:hover::before {
  left: 100%;
}

/* ══════════ UTILS ══════════ */
.hidden-loader {
  opacity: 0;
  pointer-events: none;
}
</style>
</head>

<body>

<!-- Loading Screen -->
<div id="loader">
  <div class="spinner"></div>
</div>
<div class="container">
  <h1>ANIMEX</h1>

  <!-- Info Rows -->
  <div class="row">
    <span>Version</span>
    <span id="version">Loading...</span>
  </div>

  <div class="row">
    <span>File Size</span>
    <span id="size">Loading...</span>
  </div>

  <!-- Image Container -->
  <div id="desc" class="desc"></div>

  <!-- Download Button -->
  <a href="/api/download" class="btn">DOWNLOAD APK</a>
</div>

<script>
// Script sederhana untuk menghilangkan loading screen setelah halaman siap
window.addEventListener('load', () => {
  const loader = document.getElementById('loader');
  setTimeout(() => {
    loader.classList.add('hidden-loader');
  }, 800); // Delay sedikit biar smooth
});
</script>

<!-- Tetap memuat app.js eksternal sesuai permintaan -->
<script src="app.js"></script>

</body>
</html>
