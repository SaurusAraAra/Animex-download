<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Animex — Watch Anime</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --red: #c0392b;
  --red-bright: #e74c3c;
  --red-dim: rgba(192, 57, 43, 0.15);
  --bg: #080808;
  --bg2: #0f0f0f;
  --bg3: #161616;
  --surface: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.06);
  --border-red: rgba(192,57,43,0.3);
  --text: #f0f0f0;
  --text-muted: #666;
  --text-soft: #999;
  --radius: 16px;
  --radius-sm: 10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── SUBTLE BACKGROUND TEXTURE ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(192,57,43,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 80% 90%, rgba(192,57,43,0.05) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ── LOADER ── */
#loader {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  transition: opacity 0.4s ease, visibility 0.4s ease;
}
#loader.hide {
  opacity: 0;
  visibility: hidden;
}
.loader-ring {
  width: 44px;
  height: 44px;
  border: 2px solid rgba(192,57,43,0.15);
  border-top-color: var(--red);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}
.loader-text {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-muted);
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── MAIN WRAPPER ── */
.page {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 440px;
  padding: 20px 16px 40px;
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.page.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ── APP HEADER ── */
.app-header {
  text-align: center;
  margin-bottom: 28px;
}
.app-icon {
  width: 80px;
  height: 80px;
  border-radius: 20px;
  background: var(--bg3);
  border: 1px solid var(--border);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 14px;
  overflow: hidden;
}
.app-icon svg {
  width: 48px;
  height: 48px;
}
.app-name {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--text);
}
.app-tagline {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 4px;
  font-weight: 400;
}

/* ── CARD ── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
  transition: border-color 0.2s;
}
.card:hover {
  border-color: var(--border-red);
}

/* ── INFO ROWS ── */
.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
}
.info-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  transition: border-color 0.2s;
}
.info-item:hover { border-color: var(--border-red); }
.info-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 5px;
}
.info-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}

/* ── BADGE ── */
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(192,57,43,0.1);
  border: 1px solid var(--border-red);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 500;
  color: var(--red-bright);
  margin-bottom: 20px;
}
.status-dot {
  width: 6px;
  height: 6px;
  background: var(--red-bright);
  border-radius: 50%;
  animation: pulse 2s ease infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

/* ── SCREENSHOTS ── */
.screenshots-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}
#desc {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
#desc img {
  width: 100%;
  border-radius: 12px;
  border: 1px solid var(--border);
  display: block;
  transition: border-color 0.2s;
}
#desc img:hover { border-color: var(--border-red); }
#desc .bold {
  font-weight: 600;
  font-size: 14px;
  color: var(--text-soft);
  padding: 4px 0;
}
#desc .text {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.6;
}

/* ── DIVIDER ── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 16px 0;
}

/* ── BUTTONS ── */
.btn-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 16px;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 15px 20px;
  border-radius: var(--radius-sm);
  text-decoration: none;
  font-weight: 600;
  font-size: 15px;
  letter-spacing: 0.3px;
  transition: all 0.2s ease;
  cursor: pointer;
  border: none;
  font-family: 'Outfit', sans-serif;
}

.btn-primary {
  background: var(--red);
  color: #fff;
  box-shadow: 0 4px 20px rgba(192,57,43,0.25);
}
.btn-primary:hover {
  background: var(--red-bright);
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(192,57,43,0.4);
}
.btn-primary:active { transform: translateY(0); }

.btn-secondary {
  background: var(--surface);
  color: var(--text-soft);
  border: 1px solid var(--border);
}
.btn-secondary:hover {
  border-color: var(--border-red);
  color: var(--text);
  background: rgba(192,57,43,0.06);
}

.btn svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
}

/* ── DEVICE SPECIFIC DOWNLOAD ── */
.device-banner {
  display: none;
  background: rgba(192,57,43,0.06);
  border: 1px solid var(--border-red);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-size: 13px;
  color: var(--text-soft);
  margin-bottom: 12px;
  align-items: center;
  gap: 10px;
}
.device-banner.show { display: flex; }
.device-banner svg { width: 16px; height: 16px; color: var(--red-bright); flex-shrink: 0; }

/* ── FOOTER ── */
footer {
  margin-top: 32px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}
.footer-links {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}
.footer-links a {
  font-size: 12px;
  color: var(--text-muted);
  text-decoration: none;
  transition: color 0.2s;
  letter-spacing: 0.3px;
}
.footer-links a:hover { color: var(--red-bright); }
.footer-copy {
  font-size: 11px;
  color: #3a3a3a;
  letter-spacing: 0.5px;
}

/* ── DESKTOP LAYOUT ── */
@media (min-width: 700px) {
  .page {
    max-width: 860px;
    padding: 40px 24px 60px;
  }
  .app-header {
    display: flex;
    align-items: center;
    text-align: left;
    gap: 20px;
    margin-bottom: 32px;
  }
  .app-icon {
    width: 90px;
    height: 90px;
    margin-bottom: 0;
    flex-shrink: 0;
  }
  .page-body {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 16px;
    align-items: start;
  }
  .col-left { min-width: 0; }
  .col-right { position: sticky; top: 20px; }
  .info-grid { grid-template-columns: repeat(3, 1fr); }
  footer { flex-direction: row; justify-content: space-between; }
}

/* ── iOS STANDALONE ── */
@media (display-mode: standalone) {
  body { padding-top: env(safe-area-inset-top); }
}
</style>
</head>
<body>

<!-- Loader -->
<div id="loader">
  <div class="loader-ring"></div>
  <div class="loader-text">Loading</div>
</div>

<div class="page" id="page">

  <!-- App Header -->
  <div class="app-header">
    <div class="app-icon">
      <!-- Animex icon: play + stream lines -->
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="48" height="48" rx="10" fill="#161616"/>
        <circle cx="24" cy="24" r="14" stroke="#c0392b" stroke-width="1.5" fill="none" opacity="0.4"/>
        <path d="M21 18.5L31 24L21 29.5V18.5Z" fill="#c0392b"/>
        <path d="M6 8h4M6 12h2M6 16h3" stroke="#c0392b" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
        <path d="M42 32h-4M42 36h-2M42 40h-3" stroke="#c0392b" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
      </svg>
    </div>
    <div>
      <div class="app-name">Animex</div>
      <div class="app-tagline">Stream anime, anywhere.</div>
    </div>
  </div>

  <!-- Page Body -->
  <div class="page-body">
    <div class="col-left">

      <!-- Status Badge -->
      <div style="margin-bottom:20px">
        <span class="status-badge">
          <span class="status-dot"></span>
          <span id="update-label">Checking updates...</span>
        </span>
      </div>

      <!-- Info -->
      <div class="card">
        <div class="info-grid">
          <div class="info-item">
            <div class="info-label">Version</div>
            <div class="info-value" id="version">—</div>
          </div>
          <div class="info-item">
            <div class="info-label">Size</div>
            <div class="info-value" id="size">—</div>
          </div>
          <div class="info-item">
            <div class="info-label">Platform</div>
            <div class="info-value">Android</div>
          </div>
        </div>
      </div>

      <!-- Description / Screenshots -->
      <div class="card" id="desc-card" style="display:none">
        <div class="screenshots-label">About</div>
        <div id="desc"></div>
      </div>

    </div>

    <div class="col-right">

      <!-- Device banner -->
      <div class="device-banner" id="device-banner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>
        </svg>
        <span id="device-msg"></span>
      </div>

      <!-- Buttons -->
      <div class="btn-group">
        <a href="/api/download" class="btn btn-primary" id="btn-direct">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download APK
        </a>
        <a href="https://apkpure.com/p/com.animex.saurusgege" target="_blank" rel="noopener" class="btn btn-secondary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          Download via APKPure
        </a>
      </div>

      <!-- Footer -->
      <footer>
        <div class="footer-links">
          <a href="/privacy">Privacy Policy</a>
          <a href="/privacy">Terms of Use</a>
          <a href="mailto:support@animex.app">Contact</a>
        </div>
        <div class="footer-copy">&copy; 2025 Animex. All rights reserved.</div>
      </footer>

    </div>
  </div>

</div>

<script>
// Device detection
const ua = navigator.userAgent;
const isIOS = /iphone|ipad|ipod/i.test(ua);
const isAndroid = /android/i.test(ua);
const isDesktop = !isIOS && !isAndroid;

const banner = document.getElementById('device-banner');
const msg = document.getElementById('device-msg');

if (isIOS) {
  banner.classList.add('show');
  msg.textContent = 'iOS detected — use APKPure to sideload via alternative methods.';
  document.getElementById('btn-direct').style.display = 'none';
} else if (isAndroid) {
  banner.classList.add('show');
  msg.textContent = 'Android detected — direct download available.';
} else {
  banner.classList.add('show');
  msg.textContent = 'Desktop detected — download and transfer to your Android device.';
}

// Loader hide
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('loader').classList.add('hide');
    document.getElementById('page').classList.add('visible');
  }, 600);
});
</script>

<script src="/app.js"></script>
</body>
</html>
