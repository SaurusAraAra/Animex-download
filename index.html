<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animex APK Distribution</title>

<style>
:root {
  --bg:#0a0a0a;
  --card:#151515;
  --accent:#ff3c3c;
  --text:#ffffff;
  --sub:#9a9a9a;
  --radius:14px;
  --shadow:0 10px 30px rgba(0,0,0,0.6);
}

* {
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu;
}

body {
  background:linear-gradient(135deg,#0a0a0a,#111);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.wrapper {
  width:100%;
  max-width:420px;
  padding:20px;
}

.brand {
  text-align:center;
  margin-bottom:25px;
}

.brand h1 {
  font-size:42px;
  letter-spacing:3px;
  font-weight:800;
}

.brand span {
  display:block;
  color:var(--sub);
  margin-top:6px;
  font-size:14px;
}

.card {
  background:var(--card);
  border-radius:var(--radius);
  padding:22px;
  box-shadow:var(--shadow);
  position:relative;
  overflow:hidden;
}

.card::before {
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent,rgba(255,60,60,0.15),transparent);
  opacity:.4;
}

.row {
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.label {
  color:var(--sub);
}

.value {
  font-weight:600;
}

.changelog {
  margin-top:15px;
  padding:12px;
  background:#0f0f0f;
  border-radius:10px;
  font-size:13px;
  line-height:1.5;
  max-height:120px;
  overflow:auto;
}

.btn {
  display:block;
  margin-top:18px;
  width:100%;
  text-align:center;
  padding:14px;
  border-radius:10px;
  text-decoration:none;
  font-weight:700;
  background:var(--accent);
  color:#fff;
  transition:.2s;
}

.btn:hover {
  transform:translateY(-2px);
  opacity:.9;
}

.meta {
  margin-top:14px;
  font-size:12px;
  color:var(--sub);
  text-align:center;
}

.loader {
  width:18px;
  height:18px;
  border:3px solid #333;
  border-top:3px solid var(--accent);
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
}

@keyframes spin {
  to { transform:rotate(360deg); }
}

.hidden {
  display:none;
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="brand">
    <h1>ANIMEX</h1>
    <span>APK Distribution Center</span>
  </div>

  <div class="card">
    <div id="loading" class="loader"></div>

    <div id="content" class="hidden">
      <div class="row">
        <div class="label">Versi</div>
        <div id="version" class="value">-</div>
      </div>

      <div class="row">
        <div class="label">Build</div>
        <div id="build" class="value">-</div>
      </div>

      <div class="row">
        <div class="label">Ukuran</div>
        <div id="size" class="value">-</div>
      </div>

      <div class="changelog" id="changelog"></div>

      <a id="download" class="btn">Download APK</a>

      <div class="meta" id="meta"></div>
    </div>
  </div>
</div>

<script>
const CONFIG = {
  repo: "USERNAME/REPO",
  api: "https://api.github.com/repos/"
};

const STATE = {
  release: null,
  asset: null
};

function formatBytes(bytes) {
  if (!bytes) return "Unknown";
  const sizes = ["B","KB","MB","GB"];
  const i = Math.floor(Math.log(bytes)/Math.log(1024));
  return (bytes/Math.pow(1024,i)).toFixed(2) + " " + sizes[i];
}

function setText(id, value) {
  document.getElementById(id).innerText = value;
}

function render() {
  const r = STATE.release;
  const a = STATE.asset;

  setText("version", r.tag_name || "unknown");
  setText("build", r.name || "release");
  setText("size", formatBytes(a.size));

  document.getElementById("changelog").innerText = r.body || "No changelog available";

  const btn = document.getElementById("download");
  btn.href = a.browser_download_url;
  btn.onclick = () => {
    setText("meta", "Downloading...");
  };

  const date = new Date(r.published_at).toLocaleString();
  setText("meta", "Published " + date);

  document.getElementById("loading").classList.add("hidden");
  document.getElementById("content").classList.remove("hidden");
}

async function fetchRelease() {
  const url = CONFIG.api + CONFIG.repo + "/releases/latest";
  const res = await fetch(url);
  const data = await res.json();

  STATE.release = data;

  const apk = (data.assets || []).find(x => x.name.toLowerCase().endsWith(".apk"));

  if (!apk) {
    document.getElementById("loading").innerText = "APK not found";
    return;
  }

  STATE.asset = apk;

  render();
}

function boot() {
  fetchRelease().catch(() => {
    document.getElementById("loading").innerText = "Failed load data";
  });
}

boot();
</script>

</body>
</html>
